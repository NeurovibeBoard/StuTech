<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroVibe Ltd | Future Learning</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #0f172a, #000);
  color: white;
}

/* NAVBAR */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  background: rgba(0,0,0,0.6);
  position: sticky;
  top: 0;
  backdrop-filter: blur(10px);
}

nav a {
  color: white;
  margin: 0 10px;
  text-decoration: none;
}

nav a:hover {
  color: #38bdf8;
}

/* HERO */
.hero {
  text-align: center;
  padding: 80px 20px;
}

.hero h1 {
  font-size: 55px;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #38bdf8; }
  to { text-shadow: 0 0 30px #0ea5e9; }
}

/* CARDS */
.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 20px;
  margin: 20px auto;
  width: 80%;
}

/* BUTTON */
button {
  padding: 10px 20px;
  border: none;
  background: #38bdf8;
  cursor: pointer;
  border-radius: 10px;
}

/* SECTIONS */
section {
  padding: 40px;
}

/* LOGIN BOX */
.login-box {
  width: 300px;
  margin: auto;
  text-align: center;
}

input {
  width: 90%;
  padding: 10px;
  margin: 10px;
}
</style>

</head>

<body>

<!-- NAVIGATION -->
<nav>
  <div><b>NeuroVibe Ltd</b></div>
  <div>
    <a href="#home">Home</a>
    <a href="#leaders">Leadership</a>
    <a href="#login">Login</a>
    <a href="#dashboard">Dashboard</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero" id="home">
  <h1>NeuroVibeBoard</h1>
  <p>Future of Smart Student Learning 🚀</p>
</div>

<!-- LEADERSHIP -->
<section id="leaders">

<div class="card">
  <h2>Chairman</h2>
  <p>Abhyam Verma</p>
</div>

<div class="card">
  <h2>CEO</h2>
  <p>Lavanya Sharma</p>
</div>

<div class="card">
  <h2>Core Team Head (StuTech)</h2>
  <p>Viviswan Soni</p>
</div>

</section>

<!-- LOGIN -->
<section id="login">

<h2 style="text-align:center;">Student Login</h2>

<div class="login-box">
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

</section>

<!-- DASHBOARD -->
<section id="dashboard" style="display:none;">

<div class="card">
  <h2>Student Dashboard</h2>
  <p id="welcome"></p>

  <ul>
    <li>📘 Syllabus</li>
    <li>🧠 Quizzes</li>
    <li>📄 Notes</li>
  </ul>
</div>

</section>

<script>
function login() {
  let u = document.getElementById("user").value;

  if (u === "") {
    alert("Enter username");
    return;
  }

  document.getElementById("login").style.display = "none";
  document.getElementById("dashboard").style.display = "block";

  document.getElementById("welcome").innerText =
    "Welcome " + u + " to NeuroVibeBoard 🚀";
}
</script>

</body>
</html>
